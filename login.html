<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nitidoc — Acceso</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">Nitidoc</div>
      <p class="tagline">Gestión oftalmológica clara, segura y rápida</p>

      <div id="alert-box"></div>

      <form id="login-form">
        <label for="login-email">Email del médico</label>
        <input
          type="email"
          id="login-email"
          name="email"
          placeholder="doctor@clinica.com"
          required
          autocomplete="email"
        />
        <label for="login-password">Contraseña</label>
        <input
          type="password"
          id="login-password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
        <button type="submit" class="btn btn-primary btn-block">
          Ingresar
        </button>
        <p class="text-muted mt-1" style="font-size: 0.85rem;">
          ¿No tienes cuenta? <a href="#" id="show-signup">Regístrate</a>
        </p>
      </form>

      <form id="signup-form" class="hidden">
        <label for="signup-email">Email del médico</label>
        <input
          type="email"
          id="signup-email"
          name="email"
          placeholder="doctor@clinica.com"
          required
          autocomplete="email"
        />
        <label for="signup-password">Contraseña</label>
        <input
          type="password"
          id="signup-password"
          name="password"
          placeholder="Mínimo 8 caracteres"
          required
          minlength="8"
          autocomplete="new-password"
        />
        <button type="submit" class="btn btn-primary btn-block">
          Crear cuenta
        </button>
        <p class="text-muted mt-1" style="font-size: 0.85rem;">
          ¿Ya tienes cuenta? <a href="#" id="show-login">Ingresa aquí</a>
        </p>
      </form>

      <div class="login-divider"><span>o</span></div>

      <button type="button" id="demo-access-btn" class="btn btn-outline btn-block">
        Entrar como demo
      </button>

      <p class="text-muted mt-1" style="font-size: 0.8rem;">
        Nitidoc protege la información de tus pacientes mediante autenticación
        segura, contraseñas, PIN de bloqueo rápido y políticas de acceso por médico.
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script type="module">
    import { initLoginForm } from './js/auth.js';
    initLoginForm();
  </script>
</body>
</html>
